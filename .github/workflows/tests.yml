name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # The plugin subclasses hermes-agent's MemoryProvider base class, so a few
      # of the test files need it importable. Only the `agent/` package
      # (a pure-stdlib ABC) is required, grab just that via a sparse, blobless
      # clone instead of pulling the whole upstream repo. This also doubles as
      # an upstream smoke test: if the base class ever changes shape, CI catches
      # it (see scripts/tests/conftest.py).
      - name: Fetch hermes-agent base class (sparse)
        run: |
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/NousResearch/hermes-agent.git
          cd hermes-agent
          git sparse-checkout set agent

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Minimal runtime deps, chromadb (embedder) is intentionally omitted:
          # the suite uses throwaway SQLite fixtures and never calls the model.
          pip install sqlite-vec networkx numpy PyYAML pytest

      - name: Run tests
        env:
          HERMES_HOME: ${{ runner.temp }}/hermes-home
          PYTHONPATH: scripts:hermes-agent
        run: |
          mkdir -p "$HERMES_HOME"
          pytest scripts/tests/ -q
